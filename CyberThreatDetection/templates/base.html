<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AI-Based Cyber Threat Detection Framework - Intelligent network intrusion detection using machine learning">
    <title>{% block title %}CyberShield AI{% endblock %} | Cyber Threat Detection</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    {% block extra_css %}{% endblock %}
</head>
<body>
    {% block body %}
    <!-- Sidebar -->
    <nav id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-brand">
                <i class="bi bi-shield-lock-fill brand-icon"></i>
                <span class="brand-text">CyberShield<span class="text-accent">AI</span></span>
            </div>
            <button class="sidebar-toggle d-lg-none" onclick="toggleSidebar()">
                <i class="bi bi-x-lg"></i>
            </button>
        </div>

        <div class="sidebar-nav">
            <div class="nav-section-label">MAIN</div>
            <a href="{{ url_for('views.dashboard') }}" class="sidebar-link {% if request.endpoint == 'views.dashboard' %}active{% endif %}">
                <i class="bi bi-grid-1x2-fill"></i>
                <span>Dashboard</span>
            </a>
            <a href="{{ url_for('views.predict_page') }}" class="sidebar-link {% if request.endpoint == 'views.predict_page' %}active{% endif %}">
                <i class="bi bi-crosshair"></i>
                <span>Predict Threat</span>
            </a>
            <a href="{{ url_for('views.upload_page') }}" class="sidebar-link {% if request.endpoint == 'views.upload_page' %}active{% endif %}">
                <i class="bi bi-cloud-arrow-up-fill"></i>
                <span>Upload CSV</span>
            </a>

            <div class="nav-section-label">ANALYSIS</div>
            <a href="{{ url_for('views.analytics_page') }}" class="sidebar-link {% if request.endpoint == 'views.analytics_page' %}active{% endif %}">
                <i class="bi bi-bar-chart-line-fill"></i>
                <span>Model Analytics</span>
            </a>
            <a href="{{ url_for('views.history_page') }}" class="sidebar-link {% if request.endpoint == 'views.history_page' %}active{% endif %}">
                <i class="bi bi-clock-history"></i>
                <span>History</span>
            </a>

            <div class="nav-section-label">INFO</div>
            <a href="{{ url_for('views.about_page') }}" class="sidebar-link {% if request.endpoint == 'views.about_page' %}active{% endif %}">
                <i class="bi bi-info-circle-fill"></i>
                <span>About</span>
            </a>
        </div>

        <div class="sidebar-footer">
            <div class="system-status">
                <div class="status-dot" id="statusDot"></div>
                <span id="statusText">Checking...</span>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content" id="mainContent">
        <!-- Top Bar -->
        <header class="topbar">
            <div class="topbar-left">
                <button class="sidebar-toggle-btn d-lg-none" onclick="toggleSidebar()">
                    <i class="bi bi-list"></i>
                </button>
                <h1 class="page-title">{% block page_title %}Dashboard{% endblock %}</h1>
            </div>
            <div class="topbar-right">
                <div class="topbar-item" id="liveTime"></div>
                <a href="{{ url_for('views.index') }}" class="topbar-btn" title="Home">
                    <i class="bi bi-house-fill"></i>
                </a>
            </div>
        </header>

        <!-- Page Content -->
        <div class="page-content">
            {% block content %}{% endblock %}
        </div>
    </main>
    {% endblock %}

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
